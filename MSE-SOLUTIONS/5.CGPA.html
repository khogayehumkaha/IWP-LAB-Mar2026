<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGPA to Percentage Converter</title>
</head>
<body>
    <h2>CGPA to Percentage Converter</h2>
    <label for="cgpa">Enter CGPA (0 to 10):</label>
    <input type="number" id="cgpa" min="0" max="10" step="0.01">
    <button onclick="convertCGPA()">Convert</button>
    <p id="result"></p>
    <script>
        function convertCGPA() {          
            var cgpa = parseFloat(document.getElementById("cgpa").value);         
            if (cgpa >= 0 && cgpa <= 10) {              
                var percentage = cgpa * 9.5;
                document.getElementById("result").innerHTML = "Percentage Equivalent: " + percentage.toFixed(2) + "%";
            } else {               
                document.getElementById("result").innerHTML = "Please enter a valid CGPA (between 0 and 10).";
            }
        }
    </script>
</body>
</html>
