<!DOCTYPE html>
<html>
<head>
<style>

  li {
    margin: 5px; 
    padding: 10px 20px 10px 20px; 
    border: 1px solid #dab1b1;     
    background-color: #f9f9f9;
  }

  .custom-list {
       list-style-image: url('star.png');
  }
</style>
</head>
<body>

  <h2>Customized List Properties</h2>
  
  <ul class="custom-list">
    <li>First Item with 5px margin and custom padding</li>
    <li>Second Item with a star logo as a bullet</li>
    <li>Third Item demonstrating layout properties</li>
  </ul>

</body>
</html>
